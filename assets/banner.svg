<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f172a"></stop>
      <stop offset="0.48" stop-color="#1d4ed8"></stop>
      <stop offset="1" stop-color="#7c3aed"></stop>
    </linearGradient>

    <linearGradient id="line" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0"></stop>
      <stop offset="0.5" stop-color="#93c5fd" stop-opacity="0.85"></stop>
      <stop offset="1" stop-color="#c084fc" stop-opacity="0"></stop>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="coloredBlur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <radialGradient id="dot" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"></stop>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"></stop>
    </radialGradient>
  </defs>

  <rect width="1200" height="360" rx="30" fill="url(#bg)"></rect>

  <path d="M0 255 C180 210 330 290 515 235 C715 175 895 215 1200 160 L1200 360 L0 360 Z" fill="#020617" opacity="0.35"></path>
  <path d="M0 300 C260 250 395 330 620 280 C820 235 995 275 1200 225 L1200 360 L0 360 Z" fill="#020617" opacity="0.45"></path>

  <path d="M120 95 H1080" stroke="url(#line)" stroke-width="2" opacity="0.55"></path>
  <path d="M120 265 H1080" stroke="url(#line)" stroke-width="2" opacity="0.55"></path>

  <g opacity="0.22">
    <circle cx="190" cy="115" r="4" fill="url(#dot)">
      <animate attributeName="opacity" values="0.15;0.8;0.15" dur="3s" repeatCount="indefinite"></animate>
    </circle>
    <circle cx="990" cy="90" r="5" fill="url(#dot)">
      <animate attributeName="opacity" values="0.1;0.75;0.1" dur="4s" repeatCount="indefinite"></animate>
    </circle>
    <circle cx="1040" cy="250" r="4" fill="url(#dot)">
      <animate attributeName="opacity" values="0.2;0.85;0.2" dur="3.5s" repeatCount="indefinite"></animate>
    </circle>
    <circle cx="260" cy="260" r="3.5" fill="url(#dot)">
      <animate attributeName="opacity" values="0.1;0.7;0.1" dur="2.8s" repeatCount="indefinite"></animate>
    </circle>
  </g>

  <g opacity="0.2">
    <path d="M170 215 L240 165 L315 215 L385 165 L460 215" stroke="#e0f2fe" stroke-width="2"></path>
    <path d="M740 145 L805 105 L870 145 L935 105 L1000 145" stroke="#f5d0fe" stroke-width="2"></path>
  </g>

  <text x="600" y="150" text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="64" font-weight="800" fill="#ffffff" filter="url(#glow)">
    Keleoz Cyber
  </text>

  <text x="600" y="203" text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="24" font-weight="650" fill="#e0f2fe">
    Code  |  AI  |  Maps  |  Stories
  </text>

  <text x="600" y="248" text-anchor="middle" font-family="JetBrains Mono, Consolas, monospace" font-size="18" fill="#c7d2fe" opacity="0.95">
    building practical projects with clear logic
  </text>
</svg>